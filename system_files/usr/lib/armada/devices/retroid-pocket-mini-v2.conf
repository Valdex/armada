# Hardware facts are pinned to ROCKNIX distribution commit
# 3e4ee5852e6ca5ea73a38369d2639fad2262648b (ROCKNIX 20260701):
# projects/ROCKNIX/devices/SM8250/linux/dts/qcom/sm8250-retroidpocket-rpminiv2.dts
ARMADA_DEVICE_ID=retroid-pocket-mini-v2
ARMADA_DEVICE_NAME='Retroid Pocket Mini V2'
ARMADA_SOC_CLASS=SM8250

ARMADA_PRIMARY_CONNECTOR=DSI-1
ARMADA_PANEL_ORIENTATION=right
ARMADA_PANEL_NATIVE_WIDTH=1080
ARMADA_PANEL_NATIVE_HEIGHT=1240
ARMADA_PANEL_REFRESH_RATES=60
ARMADA_GAMESCOPE_USE_ROTATION_SHADER=1
# Fake size for Steam's auto UI scale, not the real panel dimensions: matches
# the ~10.85 px/mm the other Armada handhelds report (1920x1080 -> 177x100),
# applied to the native portrait 1080x1240 mode. Without it Steam picks a huge
# default scale. Verify on device; the real 3.92" panel is far smaller.
ARMADA_GAMESCOPE_FAKE_OUTPUT_MM=100x114
ARMADA_GAMEPAD_QUIRK=none
# Exact stock A650 OPP; the global 680 MHz floor exceeds SM8250's 670 MHz max.
ARMADA_GPU_GAME_FLOOR_MHZ=587
